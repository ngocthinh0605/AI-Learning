services:
  # ──────────────────────────────────────────────
  # Redis — ActionCable pub/sub adapter
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────
  # PostgreSQL + pgvector (required for kb_chunks.embedding / neighbor gem)
  # https://github.com/pgvector/pgvector
  # ──────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Rails API Backend
  # ──────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      RAILS_ENV: development
      DB_HOST: db
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DEVISE_JWT_SECRET_KEY: ${DEVISE_JWT_SECRET_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:9b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_EMBEDDING_DIMENSIONS: ${OLLAMA_EMBEDDING_DIMENSIONS:-768}
      WHISPER_SERVICE_URL: http://whisper:8001
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # entrypoint handles DB creation (via psql) + migration + puma start

  # ──────────────────────────────────────────────
  # Whisper Transcription Microservice
  # ──────────────────────────────────────────────
  whisper:
    build: ./whisper-service
    ports:
      - "8001:8001"
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
    volumes:
      # Cache downloaded Whisper models between container restarts
      - whisper_models:/root/.cache/whisper

  # ──────────────────────────────────────────────
  # React Frontend
  # ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ──────────────────────────────────────────────
  # React Frontend (Dev + Hot Reload via Vite)
  # ──────────────────────────────────────────────
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "yarn install --network-timeout 100000 && yarn dev --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_CABLE_URL: ws://localhost:3001/cable
    volumes:
      - ./frontend:/app
      # Keep container node_modules isolated from host for stability.
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  postgres_data:
  whisper_models:
  redis_data:
  frontend_node_modules:
